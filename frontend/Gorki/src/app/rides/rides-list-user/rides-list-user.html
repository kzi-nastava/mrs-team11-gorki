<div class="filters">

  <app-date-filter
    (dateChanged)="filterByDate($event)">
  </app-date-filter>

  <hr class="divider">

  <app-sort-filter
    (sortChanged)="sortRides($event)">
  </app-sort-filter>

</div>


<div class="carousel-wrapper">

  <button 
    class="nav left" 
    (click)="scrollLeft()">
    ‹
  </button>


  <div 
    class="ride-list" 
    #carousel
    data-testid="ride-list">


    <app-ride-card-user
      *ngFor="let ride of rides"
      data-testid="ride-card"
      [ride]="ride"
      (goToMap)="openMap(ride)"
      (rateRide)="openRatingPanel($event)">
    </app-ride-card-user>


  </div>


  <button 
    class="nav right" 
    (click)="scrollRight()">
    ›
  </button>


</div>


<app-rating-panel
  *ngIf="showRating"
  (submit)="handleRating($event)"
  (close)="showRating = false">
</app-rating-panel>
